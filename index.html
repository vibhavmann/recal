<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recal — Adaptive Learning Assistant</title>
  <script>
    const t = localStorage.getItem("cb-theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div id="sidebar-overlay" class="sidebar-overlay" hidden></div>

  <div id="main-app">

    <header>
      <button id="sidebar-toggle" class="sidebar-toggle" title="Open materials">☰</button>

      <div class="brand-sm"><span>Re</span><span class="accent">cal</span></div>

      <nav class="mode-nav" id="mode-nav">
        <button class="mode-btn" data-mode="chat">💬 Chat</button>
        <button class="mode-btn" data-mode="test">🎯 Test</button>
        <button class="mode-btn" data-mode="plan">📅 Plan</button>
        <button class="mode-btn" data-mode="mastery">📊 Mastery</button>
      </nav>

      <div class="header-actions">
        <button id="new-chat-btn" class="btn-new-chat" title="Clear conversation">＋ New Chat</button>
        <span class="model-badge" title="Powered by Claude">✦ Claude</span>
        <button id="theme-btn" class="theme-btn" title="Toggle dark / light mode">🌙</button>
      </div>
    </header>

    <div class="layout">

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-close-row">
          <span class="sidebar-title-mobile">📚 Materials</span>
          <button id="sidebar-close" class="sidebar-close" title="Close">✕</button>
        </div>

        <div class="sidebar-top">
          <div class="sidebar-header">
            <h2>Materials</h2>
            <button id="upload-btn" class="btn-sm">+ Add</button>
            <input type="file" id="file-input" multiple accept=".txt,.pdf,.md,.csv,.markdown" hidden>
          </div>
          <div id="doc-list" class="doc-list">
            <div class="empty-docs">
              <span>📚</span>
              <p>No materials yet</p>
              <p>Upload PDFs, text files, or notes</p>
            </div>
          </div>
        </div>

        <div class="sidebar-bottom">
          <div class="quick-actions">
            <p class="qa-label">Quick Actions</p>
            <button class="qa-btn" data-action="generate-test">🎯 Generate Adaptive Test</button>
            <button class="qa-btn" data-action="study-plan">📅 Build / Update Study Plan</button>
          </div>
        </div>
      </aside>

      <main class="content">

        <!-- Home / landing -->
        <div id="panel-home" class="panel active"></div>

        <!-- Document Viewer -->
        <div id="panel-viewer" class="panel"></div>

        <!-- Chat -->
        <div id="panel-chat" class="panel">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-area">
            <div class="input-row">
              <textarea
                id="chat-input"
                placeholder="Ask me to explain a concept, give an example, or help you understand anything…"
                rows="1"
              ></textarea>
              <button id="send-btn" class="btn-send" title="Send (Enter)">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Practice Test -->
        <div id="panel-test" class="panel"></div>

        <!-- Study Plan -->
        <div id="panel-plan" class="panel"></div>

        <!-- Mastery -->
        <div id="panel-mastery" class="panel"></div>

      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
